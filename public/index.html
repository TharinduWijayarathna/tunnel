<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tunnel — Local Network Exposure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="14" cy="14" r="13" stroke="#1a56db" stroke-width="1.5" fill="none"/>
              <circle cx="14" cy="14" r="8" stroke="#1a56db" stroke-width="1" fill="none" stroke-opacity="0.4"/>
              <circle cx="14" cy="14" r="3.5" fill="#1a56db" opacity="0.8"/>
              <path d="M14 1v3M14 24v3M1 14h3M24 14h3" stroke="#1a56db" stroke-width="1.25" stroke-linecap="round" stroke-opacity="0.4"/>
            </svg>
          </div>
          <h1>Tunnel</h1>
          <span class="tagline">Expose localhost to your network</span>
        </div>
        <div class="network-info" id="networkInfo">
          <!-- Populated dynamically -->
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="ports-section">
        <h2 class="section-title">
          Running applications
          <button class="btn-refresh" id="btnRefreshPorts" title="Refresh ports">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>
        </h2>
        <div class="ports-list" id="portsList">
          <div class="ports-loading" id="portsLoading">Scanning ports...</div>
        </div>
      </section>

      <section class="tunnels-section">
        <h2 class="section-title">
          Active tunnels
          <span class="tunnel-count" id="tunnelCount">0</span>
        </h2>
        <div class="tunnels-grid" id="tunnelsGrid">
          <!-- Populated dynamically -->
        </div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
          </div>
          <h3>No active tunnels</h3>
          <p>Click "Expose" on a running application above to create a tunnel.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>
      <h3 class="modal-title">Scan to access</h3>
      <div class="qr-container" id="qrContainer"></div>
      <p class="modal-url" id="modalUrl"></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
